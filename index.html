<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AERIS — Live Telemetry</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['Space Mono', 'monospace'], } } }
    }
  </script>

  <style>
    /* Animated Gradient Background */
    body {
      background: linear-gradient(-45deg, #0f172a, #020617, #1e1b4b, #0f172a);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #e2e8f0;
      min-height: 100vh;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glassmorphism Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      border-radius: 20px;
    }

    /* Pulsing Glow based on Status */
    .glow-good { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); }
    .glow-moderate { box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); }
    .glow-poor { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.5); }
    
    .value-pop { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>

<body class="p-4 sm:p-8 flex flex-col items-center">
  
  <header class="w-full max-w-5xl flex justify-between items-end mb-8 border-b border-slate-700/50 pb-4">
    <div>
      <h1 class="text-4xl font-bold text-white tracking-widest">AERIS<span class="text-cyan-400">.</span></h1>
      <p class="font-mono text-xs text-slate-400 mt-1 uppercase tracking-widest">Live Telemetry Dashboard</p>
    </div>
    <div class="text-right">
      <div id="connection-status" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-mono text-xs">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
        </span>
        Connected
      </div>
      <p id="last-updated" class="font-mono text-[10px] text-slate-500 mt-2">Waiting for data...</p>
    </div>
  </header>

  <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div id="main-card" class="glass-card p-8 md:col-span-2 transition-all duration-700 glow-good flex flex-col justify-between">
      <div class="flex justify-between items-start">
        <h2 class="font-mono text-sm text-slate-400 uppercase tracking-wider">PM2.5 Concentration</h2>
        <span id="aqi-pill" class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-500/20 text-emerald-400 border border-emerald-500/50">
          Good
        </span>
      </div>
      
      <div class="mt-6 flex items-baseline gap-3">
        <span id="dust-value" class="text-7xl font-bold text-white value-pop">--</span>
        <span class="font-mono text-lg text-slate-400">µg/m³</span>
      </div>

      <div class="w-full h-32 mt-6">
        <canvas id="aqiChart"></canvas>
      </div>
    </div>

    <div class="flex flex-col gap-6">
      
      <div class="glass-card p-6 flex-1 flex flex-col justify-center relative overflow-hidden">
        <h2 class="font-mono text-xs text-slate-400 uppercase tracking-wider mb-2">Blower RPM</h2>
        <div class="flex items-baseline gap-2 z-10">
          <span id="fan-value" class="text-5xl font-bold text-cyan-400 value-pop">--</span>
          <span class="font-mono text-slate-400">%</span>
        </div>
        <div class="absolute -bottom-10 -right-10 w-40 h-40 border-4 border-cyan-500/10 rounded-full"></div>
      </div>

      <div class="glass-card p-6 flex-1 flex flex-col justify-center">
        <h2 class="font-mono text-xs text-slate-400 uppercase tracking-wider mb-2">Total VOCs</h2>
        <div class="flex items-baseline gap-2">
          <span id="gas-value" class="text-4xl font-bold text-indigo-400 value-pop">--</span>
          <span class="font-mono text-[10px] text-slate-500">RAW ADC</span>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ⚠️ INJECTED FIREBASE CONFIG ⚠️
    const firebaseConfig = {
      apiKey: "AIzaSyCeQan2EK1OQVxhsDMsQ793mHdl4LxuMwI",
      authDomain: "aeris-monitor.firebaseapp.com",
      databaseURL: "https://aeris-monitor-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aeris-monitor",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Chart.js Setup ---
    const ctx = document.getElementById('aqiChart').getContext('2d');
    
    // Create gradient for the line chart
    let gradient = ctx.createLinearGradient(0, 0, 0, 150);
    gradient.addColorStop(0, 'rgba(16, 185, 129, 0.5)'); // Emerald fade
    gradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

    const aqiChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: Array(15).fill(''), // Show last 15 readings
        datasets: [{
          label: 'PM2.5',
          data: Array(15).fill(0),
          borderColor: '#34d399', // Emerald 400
          borderWidth: 2,
          backgroundColor: gradient,
          fill: true,
          tension: 0.4, // Smooth curves
          pointRadius: 0, // Hide dots unless hovering
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500, easing: 'easeOutQuart' },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: { 
            display: false, 
            min: 0, 
            suggestedMax: 150 // Adjust based on your sensor's typical range
          }
        }
      }
    });

    // --- Data Update Logic ---
    const colors = {
      "Good": { card: "glow-good", pillBg: "bg-emerald-500/20", pillText: "text-emerald-400", pillBorder: "border-emerald-500/50", chartHex: "#34d399" },
      "Moderate": { card: "glow-moderate", pillBg: "bg-amber-500/20", pillText: "text-amber-400", pillBorder: "border-amber-500/50", chartHex: "#fbbf24" },
      "Poor": { card: "glow-poor", pillBg: "bg-orange-500/20", pillText: "text-orange-400", pillBorder: "border-orange-500/50", chartHex: "#fb923c" },
      "Severe": { card: "glow-poor", pillBg: "bg-red-500/20", pillText: "text-red-400", pillBorder: "border-red-500/50", chartHex: "#f87171" }
    };

    onValue(ref(db, '/aeris/live'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // 1. Update Numbers
      const dust = data.dust_density ?? 0;
      document.getElementById('dust-value').textContent = dust.toFixed(1);
      document.getElementById('gas-value').textContent = data.mq135_raw ?? 0;
      document.getElementById('fan-value').textContent = data.fan_pct ?? 0;
      
      const timeStr = new Date(data.updated_ms || Date.now()).toLocaleTimeString();
      document.getElementById('last-updated').textContent = "Live • " + timeStr;

      // 2. Update Aesthetics based on status
      const label = data.aqi_label ?? "Good";
      const c = colors[label] || colors["Good"];
      
      const mainCard = document.getElementById('main-card');
      mainCard.className = `glass-card p-8 md:col-span-2 transition-all duration-700 flex flex-col justify-between ${c.card}`;
      
      const pill = document.getElementById('aqi-pill');
      pill.className = `px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest ${c.pillBg} ${c.pillText} ${c.pillBorder}`;
      pill.textContent = label;

      // 3. Update Chart dynamically
      aqiChart.data.datasets[0].data.push(dust);
      aqiChart.data.datasets[0].data.shift(); // Remove oldest data point
      
      // Change chart color based on status
      aqiChart.data.datasets[0].borderColor = c.chartHex;
      let newGradient = ctx.createLinearGradient(0, 0, 0, 150);
      let rgb = hexToRgb(c.chartHex);
      newGradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.5)`);
      newGradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.0)`);
      aqiChart.data.datasets[0].backgroundColor = newGradient;
      
      aqiChart.update();
    });

    function hexToRgb(hex) {
      let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r: 52, g: 211, b: 153};
    }
  </script>
</body>
</html>
